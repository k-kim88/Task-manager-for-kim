<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비서 태스크 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d38;
    --accent: #c8f060;
    --accent2: #60b4f0;
    --accent3: #f060b4;
    --text: #e8eaf0;
    --muted: #6b7080;
    --red: #f06060;
    --yellow: #f0c060;
    --green: #60f0a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--muted); font-style: italic; }
  .header-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    height: calc(100vh - 61px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    background: var(--surface);
  }
  .sidebar-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stat-card:hover::before, .stat-card.active::before { opacity: 1; }
  .stat-card:hover { border-color: var(--accent); transform: translateX(3px); }
  .stat-card.active { border-color: var(--accent); background: rgba(200,240,96,0.05); }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-num { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-num.urgent { color: var(--red); }
  .stat-num.today { color: var(--yellow); }
  .stat-num.total { color: var(--accent); }
  .stat-num.done { color: var(--green); }

  .filter-section { margin-top: 24px; }
  .filter-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 14px;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    margin-bottom: 6px;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .filter-btn.active { border-color: var(--accent2); background: rgba(96,180,240,0.08); color: var(--accent2); }
  .filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* MAIN */
  .main {
    overflow-y: auto;
    padding: 28px 28px;
  }
  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .main-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
  }
  .add-btn {
    background: var(--accent);
    color: #0e0f13;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-btn:hover { background: #d8ff70; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,240,96,0.3); }

  /* TASK CARDS */
  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .task-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 3px;
    border-radius: 0 12px 12px 0;
  }
  .task-card.p-high::after { background: var(--red); }
  .task-card.p-mid::after { background: var(--yellow); }
  .task-card.p-low::after { background: var(--green); }
  .task-card:hover { border-color: var(--border); background: var(--surface2); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .task-card.done { opacity: 0.4; }
  .task-card.done .task-title { text-decoration: line-through; }

  .task-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .task-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--accent); border-color: var(--accent); }
  .task-check.checked::after { content: '✓'; font-size: 12px; color: #0e0f13; font-weight: 700; }
  .task-title { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.4; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .tag-work { background: rgba(96,180,240,0.15); color: var(--accent2); }
  .tag-personal { background: rgba(240,96,180,0.15); color: var(--accent3); }
  .tag-study { background: rgba(200,240,96,0.15); color: var(--accent); }
  .tag-other { background: rgba(107,112,128,0.2); color: var(--muted); }
  .priority-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .p-high-badge { background: rgba(240,96,96,0.15); color: var(--red); }
  .p-mid-badge { background: rgba(240,192,96,0.15); color: var(--yellow); }
  .p-low-badge { background: rgba(96,240,160,0.15); color: var(--green); }
  .due-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
  .due-date.overdue { color: var(--red); }
  .due-date.soon { color: var(--yellow); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 480px;
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 22px;
  }
  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-save {
    background: var(--accent);
    color: #0e0f13;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    transition: all 0.15s;
  }
  .btn-save:hover { background: #d8ff70; }

  /* AI PANEL */
  .ai-panel {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }
  .ai-panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ai-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .ai-label { font-size: 14px; font-weight: 600; }
  .ai-sublabel { font-size: 11px; color: var(--muted); }

  .ai-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 100%;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg-user {
    background: rgba(200,240,96,0.1);
    border: 1px solid rgba(200,240,96,0.2);
    border-radius: 12px 12px 4px 12px;
    padding: 10px 14px;
    color: var(--accent);
    align-self: flex-end;
    max-width: 85%;
  }
  .msg-ai {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px 12px 12px 4px;
    padding: 12px 14px;
    color: var(--text);
    white-space: pre-wrap;
  }
  .msg-ai .ai-thinking {
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  .ai-input-area {
    padding: 14px;
    border-top: 1px solid var(--border);
  }
  .ai-quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .quick-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .ai-input:focus { border-color: var(--accent); }
  .ai-send {
    background: var(--accent);
    color: #0e0f13;
    border: none;
    border-radius: 10px;
    width: 40px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .ai-send:hover { background: #d8ff70; }
  .ai-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Delete btn */
  .task-delete {
    position: absolute;
    top: 12px; right: 16px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 2px;
  }
  .task-card:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: var(--red); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* SEARCH */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 16px; }
  .search-count { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .highlight { background: rgba(200,240,96,0.3); border-radius: 3px; padding: 0 2px; }

  /* TODAY BANNER */
  .today-banner {
    background: linear-gradient(135deg, rgba(240,192,96,0.12), rgba(240,96,96,0.08));
    border: 1px solid rgba(240,192,96,0.3);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 16px;
    display: none;
  }
  .today-banner.show { display: block; }
  .today-banner-title {
    font-size: 12px;
    color: var(--yellow);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .today-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .today-item:last-child { border-bottom: none; }
  .today-item .t-pri { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .today-item .t-title { flex: 1; }
  .today-item .t-time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

  /* PRIORITY DRAG */
  .drag-handle {
    cursor: grab;
    color: var(--muted);
    font-size: 14px;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.15s;
    user-select: none;
  }
  .task-card:hover .drag-handle { opacity: 1; }
  .task-card.dragging { opacity: 0.4; border: 2px dashed var(--accent); }
  .task-card.drag-over { border-color: var(--accent2); background: rgba(96,180,240,0.05); }

  /* PRIORITY QUICK CHANGE */
  .pri-toggle {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .pri-toggle:hover { background: rgba(255,255,255,0.08); }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    header { padding: 14px 16px; }
    .logo { font-size: 18px; }
    .header-date { display: none; }

    .layout {
      grid-template-columns: 1fr;
      height: calc(100vh - 57px);
    }
    .sidebar, .ai-panel {
      display: none;
      position: fixed;
      top: 57px; left: 0; right: 0; bottom: 57px;
      z-index: 50;
      border: none;
      overflow-y: auto;
    }
    .sidebar.mobile-open {
      display: block;
      background: var(--surface);
      padding: 20px 16px;
    }
    .ai-panel.mobile-open {
      display: flex;
      flex-direction: column;
    }
    .main { padding: 16px; padding-bottom: 80px; }
    .main-header { margin-bottom: 16px; }
    .main-title { font-size: 22px; }
    .add-btn { padding: 9px 14px; font-size: 13px; }
    .form-row-2 { grid-template-columns: 1fr; }
    .modal { width: calc(100vw - 32px); padding: 20px; }
    .task-delete { opacity: 1; }

    .mobile-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 57px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 100;
    }
    .mobile-nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: color 0.15s;
    }
    .mobile-nav-btn .nav-icon { font-size: 20px; }
    .mobile-nav-btn.active { color: var(--accent); }
  }

  @media (min-width: 769px) {
    .mobile-nav { display: none; }
  }

  /* CHART MODAL */
  .chart-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .chart-modal-overlay.open { opacity: 1; pointer-events: all; }
  .chart-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 520px; max-width: calc(100vw - 32px);
    transform: translateY(20px); transition: transform 0.2s;
  }
  .chart-modal-overlay.open .chart-modal { transform: translateY(0); }
  .chart-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 20px; }
  .chart-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .chart-label { font-size: 12px; color: var(--muted); width: 60px; flex-shrink: 0; }
  .chart-bar-bg { flex: 1; background: var(--surface2); border-radius: 6px; height: 10px; overflow: hidden; }
  .chart-bar { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
  .chart-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); width: 36px; text-align: right; }
  .chart-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .chart-stat { background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; }
  .chart-stat-num { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .chart-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .chart-section-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 16px 0 10px; }

  /* MEMO PANEL */
  .memo-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .memo-overlay.open { opacity: 1; pointer-events: all; }
  .memo-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 460px; max-width: calc(100vw - 32px);
    transform: translateY(20px); transition: transform 0.2s;
  }
  .memo-overlay.open .memo-modal { transform: translateY(0); }
  .memo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .memo-task-title { font-size: 15px; font-weight: 600; }
  .memo-list { max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
  .memo-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; position: relative; }
  .memo-item-time { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .memo-item-del { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; }
  .memo-item-del:hover { color: var(--red); }
  .memo-input-row { display: flex; gap: 8px; }
  .memo-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; }
  .memo-input:focus { border-color: var(--accent); }
  .memo-send { background: var(--accent); color: #0e0f13; border: none; border-radius: 8px; padding: 9px 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .memo-count { display: inline-block; background: var(--accent2); color: #0e0f13; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 6px; margin-left: 4px; vertical-align: middle; }

  /* NOTIFICATION BADGE */
  .notif-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .notif-btn:hover { border-color: var(--accent); color: var(--accent); }
  .notif-btn.enabled { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">비서<span>desk</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">🔔 알림</button>
    <button class="notif-btn" onclick="openChart()" style="border-color:var(--accent2);color:var(--accent2)">📊 통계</button>
    <span id="syncStatus" style="font-size:12px;color:var(--muted);font-family:JetBrains Mono,monospace">⟳ 불러오는 중...</span>
    <div class="header-date" id="headerDate"></div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="stat-card active" onclick="filterTasks('all', this)">
      <div class="stat-label">전체 태스크</div>
      <div class="stat-num total" id="statTotal">0</div>
    </div>
    <div class="stat-card" onclick="filterTasks('urgent', this)">
      <div class="stat-label">🔴 긴급 (높은 우선순위)</div>
      <div class="stat-num urgent" id="statUrgent">0</div>
    </div>
    <div class="stat-card" onclick="filterTasks('today', this)">
      <div class="stat-label">📅 오늘 마감</div>
      <div class="stat-num today" id="statToday">0</div>
    </div>
    <div class="stat-card" onclick="filterTasks('done', this)">
      <div class="stat-label">✅ 완료</div>
      <div class="stat-num done" id="statDone">0</div>
    </div>

    <div class="filter-section">
      <div class="sidebar-title" style="margin-top:8px">카테고리</div>
      <button class="filter-btn active" onclick="filterCategory('all', this)">
        <span class="filter-dot" style="background:var(--muted)"></span> 전체
      </button>
      <button class="filter-btn" onclick="filterCategory('work', this)">
        <span class="filter-dot" style="background:var(--accent2)"></span> 업무
      </button>
      <button class="filter-btn" onclick="filterCategory('personal', this)">
        <span class="filter-dot" style="background:var(--accent3)"></span> 개인
      </button>
      <button class="filter-btn" onclick="filterCategory('study', this)">
        <span class="filter-dot" style="background:var(--accent)"></span> 학습
      </button>
      <button class="filter-btn" onclick="filterCategory('other', this)">
        <span class="filter-dot" style="background:var(--muted)"></span> 기타
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <h1 class="main-title" id="mainTitle">모든 태스크</h1>
      <button class="add-btn" onclick="openModal()">
        <span>＋</span> 태스크 추가
      </button>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input id="searchInput" placeholder="제목, 설명, 카테고리로 검색..." oninput="onSearch()">
      <span class="search-count" id="searchCount"></span>
    </div>
    <div class="today-banner" id="todayBanner">
      <div class="today-banner-title">📅 오늘 할 일</div>
      <div id="todayList"></div>
    </div>
    <div class="task-list" id="taskList"></div>
  </main>

  <!-- AI PANEL REMOVED -->
</div>

<!-- MOBILE NAV -->
<nav class="mobile-nav" id="mobileNav">
  <button class="mobile-nav-btn active" id="navMain" onclick="mobileTab('main')">
    <span class="nav-icon">📋</span>태스크
  </button>
  <button class="mobile-nav-btn" id="navFilter" onclick="mobileTab('filter')">
    <span class="nav-icon">☰</span>필터
  </button>
  <button class="mobile-nav-btn" id="navAdd" onclick="openModal()">
    <span class="nav-icon">＋</span>추가
  </button>
</nav>


<!-- CHART MODAL -->
<div class="chart-modal-overlay" id="chartOverlay">
  <div class="chart-modal">
    <div class="chart-title">📊 태스크 통계</div>
    <div class="chart-summary">
      <div class="chart-stat"><div class="chart-stat-num" id="cTotal" style="color:var(--accent)">0</div><div class="chart-stat-lbl">전체</div></div>
      <div class="chart-stat"><div class="chart-stat-num" id="cDone" style="color:var(--green)">0</div><div class="chart-stat-lbl">완료</div></div>
      <div class="chart-stat"><div class="chart-stat-num" id="cRate" style="color:var(--accent2)">0%</div><div class="chart-stat-lbl">완료율</div></div>
    </div>
    <div class="chart-section-title">카테고리별 완료율</div>
    <div id="chartCat"></div>
    <div class="chart-section-title">우선순위별 현황</div>
    <div id="chartPri"></div>
    <div style="margin-top:20px;text-align:right">
      <button class="btn-cancel" onclick="closeChart()">닫기</button>
    </div>
  </div>
</div>

<!-- MEMO MODAL -->
<div class="memo-overlay" id="memoOverlay">
  <div class="memo-modal">
    <div class="memo-header">
      <div class="memo-task-title" id="memoTaskTitle"></div>
      <button class="btn-cancel" onclick="closeMemo()" style="padding:6px 12px;font-size:12px">닫기</button>
    </div>
    <div class="memo-list" id="memoList"></div>
    <div class="memo-input-row">
      <input class="memo-input" id="memoInput" placeholder="메모를 입력하세요..." onkeydown="if(event.key==='Enter')addMemo()">
      <button class="memo-send" onclick="addMemo()">추가</button>
    </div>
  </div>
</div>
<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitleText">새 태스크 추가</div>
    <div class="form-row">
      <div class="form-label">제목 *</div>
      <input class="form-input" id="fTitle" placeholder="태스크 제목을 입력하세요">
    </div>
    <div class="form-row">
      <div class="form-label">설명</div>
      <textarea class="form-textarea" id="fDesc" placeholder="상세 내용 (선택)"></textarea>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <div class="form-label">마감일</div>
        <input class="form-input" id="fDate" type="date">
      </div>
      <div class="form-row" style="margin-bottom:0">
        <div class="form-label">마감 시간</div>
        <input class="form-input" id="fTime" type="time">
      </div>
    </div>
    <div class="form-row-2" style="margin-top:16px">
      <div class="form-row" style="margin-bottom:0">
        <div class="form-label">우선순위</div>
        <select class="form-select" id="fPriority">
          <option value="high">🔴 높음 (긴급)</option>
          <option value="mid" selected>🟡 중간</option>
          <option value="low">🟢 낮음</option>
        </select>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <div class="form-label">카테고리</div>
        <select class="form-select" id="fCategory">
          <option value="work">💼 업무</option>
          <option value="personal">🏠 개인</option>
          <option value="study">📚 학습</option>
          <option value="other">📌 기타</option>
        </select>
      </div>
    </div>
    <div class="form-row" style="margin-top:16px">
      <div class="form-label">반복 설정</div>
      <select class="form-select" id="fRepeat">
        <option value="none">반복 없음</option>
        <option value="daily">매일</option>
        <option value="weekly">매주 (같은 요일)</option>
        <option value="monthly">매월 (같은 날짜)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───
const SHEET_URL = 'https://script.google.com/a/macros/fancsglobal.com/s/AKfycbz_LtF0fMQAm9GHW52jZ0QA7bag0WQ8l_rjHQmo0urMkQ-1VETKTVlooOY5eoeJyMHv0g/exec';
let tasks = [];
let currentFilter = 'all';
let currentCategory = 'all';
let editingId = null;
let isSyncing = false;

const catLabel = { work: '업무', personal: '개인', study: '학습', other: '기타' };
const priLabel = { high: '높음', mid: '중간', low: '낮음' };

function showSyncStatus(msg, color='var(--muted)') {
  const el = document.getElementById('syncStatus');
  if (el) { el.textContent = msg; el.style.color = color; }
}

async function loadTasks() {
  showSyncStatus('⟳ 불러오는 중...', 'var(--accent2)');
  try {
    const res = await fetch(SHEET_URL + '?action=getTasks');
    const data = await res.json();
    tasks = data.tasks || [];
    showSyncStatus('✓ 동기화됨', 'var(--green)');
  } catch(e) {
    tasks = JSON.parse(localStorage.getItem('biseo_tasks') || '[]');
    showSyncStatus('⚠ 오프라인 모드', 'var(--yellow)');
  }
  renderTasks();
}

async function saveTasks() {
  localStorage.setItem('biseo_tasks', JSON.stringify(tasks));
  showSyncStatus('⟳ 저장 중...', 'var(--accent2)');
  try {
    const params = new URLSearchParams({ action: 'saveTasks', tasks: JSON.stringify(tasks) });
    await fetch(SHEET_URL + '?' + params.toString());
    showSyncStatus('✓ 동기화됨', 'var(--green)');
  } catch(e) {
    showSyncStatus('⚠ 로컬 저장됨', 'var(--yellow)');
  }
}

// ─── DATE ───
function updateDate() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
}
updateDate(); setInterval(updateDate, 60000);

function toDateStr(d) { return d.toISOString().split('T')[0]; }
function today() { return toDateStr(new Date()); }
function isOverdue(task) { return task.date && !task.done && task.date < today(); }
function isTodayDue(task) { return task.date && task.date === today() && !task.done; }
function isThisWeek(task) {
  if (!task.date || task.done) return false;
  const d = new Date(task.date);
  const now = new Date();
  const weekEnd = new Date(now); weekEnd.setDate(now.getDate() + 7);
  return d >= now && d <= weekEnd;
}

// ─── RENDER ───
function updateStats() {
  const active = tasks.filter(t => !t.done);
  document.getElementById('statTotal').textContent = tasks.filter(t=>!t.done).length;
  document.getElementById('statUrgent').textContent = active.filter(t=>t.priority==='high').length;
  document.getElementById('statToday').textContent = active.filter(isTodayDue).length;
  document.getElementById('statDone').textContent = tasks.filter(t=>t.done).length;
}

function renderTasks() {
  updateStats();
  renderTodayBanner();
  let filtered = [...tasks];

  if (currentFilter === 'urgent') filtered = filtered.filter(t => t.priority === 'high' && !t.done);
  else if (currentFilter === 'today') filtered = filtered.filter(isTodayDue);
  else if (currentFilter === 'done') filtered = filtered.filter(t => t.done);

  if (currentCategory !== 'all') filtered = filtered.filter(t => t.category === currentCategory);

  // Sort: done last, then by priority, then date
  const priOrder = { high: 0, mid: 1, low: 2 };
  filtered.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.priority !== b.priority) return priOrder[a.priority] - priOrder[b.priority];
    if (a.date && b.date) return a.date.localeCompare(b.date);
    return 0;
  });

  const list = document.getElementById('taskList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>태스크가 없습니다.<br>오른쪽 상단 버튼으로 추가해보세요.</p></div>`;
    return;
  }

  // Apply search filter
  if (searchQuery) {
    filtered = filtered.filter(t =>
      t.title.toLowerCase().includes(searchQuery) ||
      (t.desc && t.desc.toLowerCase().includes(searchQuery)) ||
      catLabel[t.category].toLowerCase().includes(searchQuery) ||
      priLabel[t.priority].toLowerCase().includes(searchQuery)
    );
  }

  // Update search count
  const countEl = document.getElementById('searchCount');
  if (countEl) countEl.textContent = searchQuery ? `${filtered.length}건` : '';

  list.innerHTML = filtered.map(t => {
    const over = isOverdue(t);
    const soon = isTodayDue(t);
    const dueCls = over ? 'overdue' : (soon ? 'soon' : '');
    const dateStr = t.date ? `${t.date}${t.time ? ' '+t.time : ''}` : '';
    const dueLabel = over ? `⚠ ${dateStr}` : dateStr;
    const q = searchQuery;

    const priCycle = { high:'mid', mid:'low', low:'high' };
    const priEmoji = { high:'🔴', mid:'🟡', low:'🟢' };
    return `<div class="task-card p-${t.priority} ${t.done?'done':''}" id="tc-${t.id}" draggable="true" ondragstart="dragStart(event,'${t.id}')" ondragover="dragOver(event)" ondrop="dragDrop(event,'${t.id}')" ondragleave="dragLeave(event)">
      <div class="task-top">
        <span class="drag-handle">⠿</span>
        <div class="task-check ${t.done?'checked':''}" onclick="toggleDone('${t.id}')"></div>
        <div class="task-title" onclick="openEditModal('${t.id}')">${highlight(t.title, q)}</div>
        <button class="task-delete" onclick="deleteTask('${t.id}',event)" style="position:static;opacity:1;margin-left:auto">✕</button>
      </div>
      ${t.desc ? `<div style="font-size:12px;color:var(--muted);margin:0 0 10px 32px;line-height:1.5">${highlight(t.desc, q)}</div>` : ''}
      <div class="task-meta" style="margin-left:32px">
        <span class="tag tag-${t.category}">${catLabel[t.category]}</span>
        <button class="pri-toggle priority-badge p-${t.priority}-badge" onclick="cyclePriority('${t.id}',event)" title="클릭하여 우선순위 변경">${priEmoji[t.priority]} ${priLabel[t.priority]}</button>
        ${t.repeat && t.repeat!=='none' ? `<span style="font-size:11px;color:var(--accent2);background:rgba(96,180,240,0.1);padding:3px 8px;border-radius:20px">🔁 반복</span>` : ''}
        <button onclick="openMemo('${t.id}',event)" style="background:transparent;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px 6px;border-radius:6px;transition:color 0.15s" onmouseover="this.style.color='var(--accent2)'" onmouseout="this.style.color='var(--muted)'">💬${t.memos&&t.memos.length?`<span class="memo-count">${t.memos.length}</span>`:''}</button>
        ${dateStr ? `<span class="due-date ${dueCls}">${dueLabel}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ─── FILTER ───
function filterTasks(type, el) {
  currentFilter = type;
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const titles = { all:'모든 태스크', urgent:'긴급 태스크', today:'오늘 마감', done:'완료된 태스크' };
  document.getElementById('mainTitle').textContent = titles[type];
  renderTasks();
}

function filterCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

// ─── CRUD ───
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  // 반복 태스크: 완료 시 다음 회차 자동 생성
  if (t.done && t.repeat && t.repeat !== 'none' && t.date) {
    const exists = tasks.some(x => x.title === t.title && x.date === getNextDate(t.date, t.repeat) && !x.done);
    if (!exists) {
      tasks.unshift({
        id: Date.now().toString(),
        title: t.title,
        desc: t.desc,
        date: getNextDate(t.date, t.repeat),
        time: t.time,
        priority: t.priority,
        category: t.category,
        repeat: t.repeat,
        memos: [],
        done: false,
        createdAt: new Date().toISOString()
      });
    }
  }
  saveTasks(); renderTasks();
}

function deleteTask(id, e) {
  e.stopPropagation();
  if (!confirm('이 태스크를 삭제할까요?')) return;
  tasks = tasks.filter(t => t.id !== id);
  renderTasks();
  saveTasks();
}

function openModal() {
  editingId = null;
  document.getElementById('modalTitleText').textContent = '새 태스크 추가';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fDate').value = today();
  document.getElementById('fTime').value = '';
  document.getElementById('fPriority').value = 'mid';
  document.getElementById('fCategory').value = 'work';
  document.getElementById('fRepeat').value = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 100);
}

function openEditModal(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitleText').textContent = '태스크 수정';
  document.getElementById('fTitle').value = t.title;
  document.getElementById('fDesc').value = t.desc || '';
  document.getElementById('fDate').value = t.date || '';
  document.getElementById('fTime').value = t.time || '';
  document.getElementById('fPriority').value = t.priority;
  document.getElementById('fCategory').value = t.category;
  document.getElementById('fRepeat').value = t.repeat || 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').style.borderColor='var(--red)'; return; }
  document.getElementById('fTitle').style.borderColor='';

  const task = {
    id: editingId || Date.now().toString(),
    title,
    desc: document.getElementById('fDesc').value.trim(),
    date: document.getElementById('fDate').value,
    time: document.getElementById('fTime').value,
    priority: document.getElementById('fPriority').value,
    category: document.getElementById('fCategory').value,
    repeat: document.getElementById('fRepeat').value,
    memos: [],
    done: false,
    createdAt: new Date().toISOString()
  };

  if (editingId) {
    const idx = tasks.findIndex(t => t.id === editingId);
    task.done = tasks[idx].done;
    tasks[idx] = task;
  } else {
    tasks.unshift(task);
  }

  saveTasks(); closeModal(); renderTasks();
}

function getNextDate(dateStr, repeat) {
  const d = new Date(dateStr);
  if (repeat === 'daily') d.setDate(d.getDate() + 1);
  else if (repeat === 'weekly') d.setDate(d.getDate() + 7);
  else if (repeat === 'monthly') d.setMonth(d.getMonth() + 1);
  return d.toISOString().split('T')[0];
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── AI ───
function buildTaskContext() {
  const now = new Date();
  const todayStr = today();
  const active = tasks.filter(t => !t.done);
  
  if (tasks.length === 0) return '현재 등록된 태스크가 없습니다.';

  const lines = [`현재 날짜: ${todayStr}`, `\n=== 태스크 목록 (총 ${tasks.length}개, 미완료 ${active.length}개) ===\n`];
  
  tasks.forEach((t, i) => {
    const status = t.done ? '[완료]' : isOverdue(t) ? '[지연]' : isTodayDue(t) ? '[오늘마감]' : '[진행중]';
    const due = t.date ? ` | 마감: ${t.date}${t.time?' '+t.time:''}` : '';
    lines.push(`${i+1}. ${status} ${t.title}`);
    lines.push(`   카테고리: ${catLabel[t.category]} | 우선순위: ${priLabel[t.priority]}${due}`);
    if (t.desc) lines.push(`   설명: ${t.desc}`);
  });

  return lines.join('\n');
}

async function sendToAI(customMsg) {
  const input = document.getElementById('aiInput');
  const msg = customMsg || input.value.trim();
  if (!msg) return;

  input.value = '';
  const btn = document.getElementById('aiSendBtn');
  btn.disabled = true;

  const messagesEl = document.getElementById('aiMessages');

  // User msg
  messagesEl.innerHTML += `<div class="msg msg-user">${msg}</div>`;

  // Thinking
  const thinkingId = 'thinking-' + Date.now();
  messagesEl.innerHTML += `<div class="msg msg-ai" id="${thinkingId}"><span class="ai-thinking">✦ 분석 중...</span></div>`;
  messagesEl.scrollTop = messagesEl.scrollHeight;

  const taskContext = buildTaskContext();
  const systemPrompt = `당신은 사용자의 업무를 도와주는 유능한 AI 비서입니다. 
사용자의 태스크 목록을 분석하고 명확하고 실용적으로 대답하세요.
답변은 한국어로, 간결하고 구조적으로 작성하세요.
오늘 날짜를 기준으로 마감일과 우선순위를 고려해서 중요한 것부터 알려주세요.`;

  const userMessage = `[태스크 현황]\n${taskContext}\n\n[질문]\n${msg}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMessage }]
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || '응답을 받을 수 없습니다.';
    document.getElementById(thinkingId).textContent = reply;
  } catch (err) {
    document.getElementById(thinkingId).innerHTML = `<span style="color:var(--red)">오류가 발생했습니다. 다시 시도해주세요.</span>`;
  }

  btn.disabled = false;
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function quickAsk(q) {
  document.getElementById('aiInput').value = q;
  sendToAI(q);
}

// ─── SEARCH ───
let searchQuery = '';

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  renderTasks();
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="highlight">$1</span>');
}

// ─── TODAY BANNER ───
function renderTodayBanner() {
  const todayTasks = tasks.filter(t => isTodayDue(t) || isOverdue(t));
  const banner = document.getElementById('todayBanner');
  const list = document.getElementById('todayList');
  if (!banner || !list) return;

  if (todayTasks.length === 0) {
    banner.classList.remove('show');
    return;
  }

  const priColor = { high: 'var(--red)', mid: 'var(--yellow)', low: 'var(--green)' };
  const priOrder = { high:0, mid:1, low:2 };
  todayTasks.sort((a,b) => priOrder[a.priority] - priOrder[b.priority]);

  list.innerHTML = todayTasks.map(t => `
    <div class="today-item">
      <span class="t-pri" style="background:${priColor[t.priority]}"></span>
      <span class="t-title">${t.title}</span>
      ${t.time ? `<span class="t-time">${t.time}</span>` : ''}
      ${isOverdue(t) ? `<span style="font-size:11px;color:var(--red)">지연</span>` : ''}
    </div>`).join('');
  banner.classList.add('show');
}

// ─── PRIORITY CYCLE ───
function cyclePriority(id, e) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const cycle = { high:'mid', mid:'low', low:'high' };
  t.priority = cycle[t.priority];
  renderTasks();
  saveTasks();
}

// ─── DRAG TO REORDER ───
let dragId = null;
function dragStart(e, id) {
  dragId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function dragDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId || dragId === targetId) return;
  const fromIdx = tasks.findIndex(t => t.id === dragId);
  const toIdx = tasks.findIndex(t => t.id === targetId);
  const [moved] = tasks.splice(fromIdx, 1);
  tasks.splice(toIdx, 0, moved);
  dragId = null;
  renderTasks();
  saveTasks();
}
document.addEventListener('dragend', () => {
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('dragging','drag-over'));
});


// ─── MEMO ───
let memoTaskId = null;
function openMemo(id, e) {
  e.stopPropagation();
  memoTaskId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('memoTaskTitle').textContent = t.title;
  renderMemoList(t);
  document.getElementById('memoOverlay').classList.add('open');
  setTimeout(() => document.getElementById('memoInput').focus(), 100);
}
function closeMemo() { document.getElementById('memoOverlay').classList.remove('open'); }
function renderMemoList(t) {
  const list = document.getElementById('memoList');
  if (!t.memos || t.memos.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">메모가 없습니다.</div>';
    return;
  }
  list.innerHTML = t.memos.map((m,i) => `
    <div class="memo-item">
      <button class="memo-item-del" onclick="deleteMemo(${i})">✕</button>
      ${m.text}
      <div class="memo-item-time">${m.time}</div>
    </div>`).join('');
}
function addMemo() {
  const input = document.getElementById('memoInput');
  const text = input.value.trim();
  if (!text) return;
  const t = tasks.find(t => t.id === memoTaskId);
  if (!t) return;
  if (!t.memos) t.memos = [];
  t.memos.push({ text, time: new Date().toLocaleString('ko-KR') });
  input.value = '';
  renderMemoList(t);
  saveTasks(); renderTasks();
}
function deleteMemo(idx) {
  const t = tasks.find(t => t.id === memoTaskId);
  if (!t) return;
  t.memos.splice(idx, 1);
  renderMemoList(t);
  saveTasks(); renderTasks();
}
document.getElementById('memoOverlay').addEventListener('click', function(e) { if(e.target===this) closeMemo(); });

// ─── CHART ───
function openChart() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const rate = total ? Math.round(done/total*100) : 0;
  document.getElementById('cTotal').textContent = total;
  document.getElementById('cDone').textContent = done;
  document.getElementById('cRate').textContent = rate + '%';

  const cats = ['work','personal','study','other'];
  const catColors = { work:'var(--accent2)', personal:'var(--accent3)', study:'var(--accent)', other:'var(--muted)' };
  document.getElementById('chartCat').innerHTML = cats.map(c => {
    const all = tasks.filter(t => t.category===c);
    const d = all.filter(t => t.done).length;
    const r = all.length ? Math.round(d/all.length*100) : 0;
    return `<div class="chart-row">
      <div class="chart-label">${catLabel[c]}</div>
      <div class="chart-bar-bg"><div class="chart-bar" style="width:${r}%;background:${catColors[c]}"></div></div>
      <div class="chart-val">${r}%</div>
    </div>`;
  }).join('');

  const pris = ['high','mid','low'];
  const priColors = { high:'var(--red)', mid:'var(--yellow)', low:'var(--green)' };
  document.getElementById('chartPri').innerHTML = pris.map(p => {
    const all = tasks.filter(t => t.priority===p && !t.done).length;
    const maxVal = Math.max(...pris.map(x => tasks.filter(t=>t.priority===x&&!t.done).length), 1);
    return `<div class="chart-row">
      <div class="chart-label">${priLabel[p]}</div>
      <div class="chart-bar-bg"><div class="chart-bar" style="width:${Math.round(all/maxVal*100)}%;background:${priColors[p]}"></div></div>
      <div class="chart-val">${all}개</div>
    </div>`;
  }).join('');

  document.getElementById('chartOverlay').classList.add('open');
}
function closeChart() { document.getElementById('chartOverlay').classList.remove('open'); }
document.getElementById('chartOverlay').addEventListener('click', function(e) { if(e.target===this) closeChart(); });

// ─── NOTIFICATIONS ───
async function toggleNotifications() {
  const btn = document.getElementById('notifBtn');
  if (Notification.permission === 'granted') {
    btn.classList.toggle('enabled');
    if (btn.classList.contains('enabled')) {
      btn.textContent = '🔔 알림 ON';
      localStorage.setItem('notif', 'on');
      scheduleNotifications();
    } else {
      btn.textContent = '🔔 알림';
      localStorage.setItem('notif', 'off');
    }
  } else {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      btn.classList.add('enabled');
      btn.textContent = '🔔 알림 ON';
      localStorage.setItem('notif', 'on');
      scheduleNotifications();
    }
  }
}

function scheduleNotifications() {
  const now = new Date();
  const todayStr = today();
  tasks.filter(t => !t.done && t.date).forEach(t => {
    const daysLeft = Math.ceil((new Date(t.date) - now) / 86400000);
    if (daysLeft === 1) {
      setTimeout(() => {
        new Notification('⚠ 내일 마감!', { body: t.title, icon: '📋' });
      }, 1000);
    } else if (daysLeft === 0) {
      setTimeout(() => {
        new Notification('🔴 오늘 마감!', { body: t.title, icon: '📋' });
      }, 500);
    }
  });
}

function initNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (localStorage.getItem('notif') === 'on' && Notification.permission === 'granted') {
    btn.classList.add('enabled');
    btn.textContent = '🔔 알림 ON';
    scheduleNotifications();
  }
}

// ─── MOBILE NAV ───
initNotifBtn();
function mobileTab(tab) {
  const sidebar = document.querySelector('.sidebar');
  const main = document.querySelector('.main');

  sidebar.classList.remove('mobile-open');
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));

  if (tab === 'main') {
    main.style.display = 'block';
    document.getElementById('navMain').classList.add('active');
  } else if (tab === 'filter') {
    main.style.display = 'none';
    sidebar.classList.add('mobile-open');
    document.getElementById('navFilter').classList.add('active');
  }
}

loadTasks();
